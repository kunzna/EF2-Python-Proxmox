    chartsCards:
      - key: proxmox_node_charts_overview
        target: BOTH
        mode: NORMAL
        numberOfVisibleCharts: 8
        displayName: Node Overview
        description: Overview of the Proxmox Node
        charts:
          - displayName: Memory Used %
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: ((proxmox.node.memory.used)/(proxmox.node.memory.total) * 100):setUnit(Percent)
                  dqlQuery: >
                    timeseries { mem_used = avg(proxmox.node.memory.used), mem_limit = avg(proxmox.node.memory.total) }, by: {  `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:node` == $(entityId)}
                      | fieldsAdd expression = mem_used[] / mem_limit[] * 100
                      | fieldsRemove mem_used, mem_limit
                  visualization:
                    themeColor: BLUE                      

          - displayName: CPU Usage %
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: (proxmox.node.cpu.usage):setUnit(Percent)
                  dqlQuery: >
                    timeseries { cpu_usage = avg(proxmox.node.cpu.usage) }, by: {  `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:node` == $(entityId)}
                  visualization:
                    themeColor: BLUE

          - displayName: Root Filesystem Usage %
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: ((proxmox.node.rootfs.used)/(proxmox.node.rootfs.total) * 100):setUnit(Percent)
                  dqlQuery: >
                    timeseries { rootfs_used = avg(proxmox.node.rootfs.used), rootfs_limit = avg(proxmox.node.rootfs.total) }, by: {  `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:node` == $(entityId)}
                    | fieldsAdd expression = rootfs_used[] / rootfs_limit[] * 100
                    | fieldsRemove rootfs_used, rootfs_limit
                  visualization:
                    themeColor: BLUE

          - displayName: Storage Total Usage %
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: ((proxmox.node.storage.used)/(proxmox.node.storage.total) * 100):setUnit(Percent)
                  dqlQuery: >
                    timeseries { storage_used = avg(proxmox.node.storage.used), storage_limit = avg(proxmox.node.storage.total) }, by: {  `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:node` == $(entityId)}
                    | fieldsAdd expression = storage_used[] / storage_limit[] * 100
                    | fieldsAdd expression = array(arrayLast(expression)), { expression.trend_line = expression }
                    | fieldsRemove storage_used, storage_limit
                  visualization:
                    themeColor: BLUE

          - displayName: Virtual Machines
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              metric:
                metricSelector: proxmox.node.vm:splitBy("dt.entity.proxmox:node"):sum:sort(value(max,descending)):last
                dqlQuery: >
                  timeseries { count(proxmox.node.vm), vms = max(proxmox.node.vm, scalar: true) }, by: { `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` },  filter:{`dt.entity.proxmox:node` == $(entityId)}, interval:5m
                    | summarize vms = sum(vms), by: { timestamp=now() }
              showTrend: true
              showSparkline: true

          - displayName: Containers
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              metric:
                metricSelector: proxmox.node.lxc:splitBy("dt.entity.proxmox:node"):sum:sort(value(max,descending)):last
                dqlQuery: >
                  timeseries { count(proxmox.node.lxc), containers = max(proxmox.node.lxc, scalar: true) }, by: { `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` },  filter:{`dt.entity.proxmox:node` == $(entityId)}, interval:5m
                    | summarize containers = sum(containers), by: { timestamp=now() }
              showTrend: true
              showSparkline: true

