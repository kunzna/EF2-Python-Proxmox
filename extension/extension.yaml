          - type: ENTITY_LIST_REF
            displayName: Clusters
            entityType: proxmox:cluster
          - type: ENTITY_REF
            entitySelectorTemplate: type(proxmox:node),toRelationships.runsOn($(entityConditions))
          - type: PLATFORM_ENTITY
            dqlField: node.relation_record
          - type: ENTITY_LIST_REF
            displayName: Nodes
            entityType: proxmox:node
        breadcrumbsDqlQuery:
          query: >
            fetch `dt.entity.proxmox:vm`
            | filter id == $(entityId)
            | fields id, node.id = runs_on[`dt.entity.proxmox:node`]
          lookups:
            - query: >
                fetch `dt.entity.proxmox:node`
                | fields id, node.relation_record = record(entityId = id, displayName = entity.name)
              sourceField: node.id
              lookupField: id
              fields:
                - node.relation_record
      layout:
        autoGenerate: false
        cards:
          - key: proxmox_vm_charts_overview
            type: CHART_GROUP
          - type: INJECTIONS

    chartsCards:
      - key: proxmox_vm_charts_overview
        target: BOTH
        mode: NORMAL
        numberOfVisibleCharts: 8
        displayName: VM Overview
        description: Overview of the Proxmox VM
        charts:
          - displayName: Memory Used %
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: ((proxmox.vm.memory.mem)/(proxmox.vm.memory.max) * 100):setUnit(Percent)
                  dqlQuery: >
                    timeseries { mem_used = avg(proxmox.vm.memory.mem), mem_limit = avg(proxmox.vm.memory.max) }, by: {  `dt.entity.proxmox:vm`, `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:vm` == $(entityId)}
                      | fieldsAdd expression = mem_used[] / mem_limit[] * 100
                      | fieldsRemove mem_used, mem_limit
                  visualization:
                    themeColor: BLUE

          - displayName: CPU Usage %
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: (proxmox.vm.cpu.usage):setUnit(Percent)
                  dqlQuery: >
                    timeseries { cpu_usage = avg(proxmox.vm.cpu.usage) }, by: {  `dt.entity.proxmox:vm`, `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:vm` == $(entityId)}
                  visualization:
                    themeColor: BLUE

          - displayName: Disk Availability %
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: (proxmox.vm.disk.usage):setUnit(Percent)
                  dqlQuery: >
                    timeseries { disk_used = avg( proxmox.vm.disk.used ), disk_limit = avg(proxmox.vm.disk.max ) }, by: {  `dt.entity.proxmox:vm`, `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:vm` == $(entityId)}
                      | fieldsAdd disk_avail = disk_limit[] - disk_used[]
                      | fieldsAdd disk_avail_percent = disk_limit[] / disk_avail[] * 100
                      | fieldsRemove disk_avail, disk_limit, disk_used
                  visualization:
                    themeColor: BLUE
          - displayName: Uptime
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              metric:
                metricSelector: proxmox.vm.uptime:splitBy("dt.entity.proxmox:vm"):sum:sort(value(max,descending)):last
                dqlQuery: >
                  timeseries { uptime_avg = avg(proxmox.vm.uptime) }, by: {  `dt.entity.proxmox:vm`, `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:vm` == $(entityId)}
                    | fieldsAdd uptime = arrayLast(uptime_avg)
                overrideUnit: units.data.hours

    entitiesListCards:
      - key: proxmox_vm_list_self
        displayName: VMs
        pageSize: 10
        entitiesLimit: 500
        displayCharts: false
        enableDetailsExpandability: false
        numberOfVisibleCharts: 2
        displayIcons: true
        columns:
          - type: RELATION
            relation:
              displayName: Virtual Machine
              entitySelectorTemplate: type(proxmox:vm),toRelationships.runsOn($(entityConditions))
documents:
  dashboards:
    - displayName: Proxmox Overview
      path: documents/proxmox_overview.dashboard.json
