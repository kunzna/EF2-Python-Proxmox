topology:
  types:
    - name: proxmox:cluster
      displayName: Cluster
      rules:
        - idPattern: proxmox_cluster_{cluster}
          instanceNamePattern: "{clusterid}"
          iconPattern: cluster
          attributes:
            - key: cluster
              displayName: Cluster Name
              pattern: "{cluster}"
            - key: clusterid
              displayName: Cluster ID
              pattern: "{clusterid}"
            - key: dt.security_context
              displayName: Security Context
              pattern: "{dt.security_context}"
          sources:
            - sourceType: Metrics
              condition: $prefix(proxmox.cluster.)
            - sourceType: Metrics
              condition: $prefix(proxmox.node.)
            - sourceType: Metrics
              condition: $prefix(proxmox.node.storage.)
            - sourceType: Metrics
              condition: $prefix(proxmox.node.service.)
            - sourceType: Metrics
              condition: $prefix(proxmox.vm.)
            - sourceType: Metrics
              condition: $prefix(proxmox.lxc.)

    - name: proxmox:node
      displayName: Node
      rules:
        - idPattern: proxmox_node_{cluster}_{node}
          instanceNamePattern: "{nodeid}"
          iconPattern: server
          attributes:
            - key: cluster
              displayName: Cluster Name
              pattern: "{cluster}"
            - key: clusterid
              displayName: Cluster ID
              pattern: "{clusterid}"
            - key: node
              displayName: Node Name
              pattern: "{node}"
            - key: nodeip
              displayName: Node IP
              pattern: "{nodeip}"
            - key: nodeid
              displayName: Node ID
              pattern: "{nodeid}"
            - key: dt.security_context
              displayName: Security Context
              pattern: "{dt.security_context}"
            - key: cpuinfo_cores
              displayName: CPU Cores
              pattern: "{cpuinfo_cores}"
            - key: cpuinfo_sockets
              displayName: CPU Sockets
              pattern: "{cpuinfo_sockets}"
          sources:
            - sourceType: Metrics
              condition: $prefix(proxmox.node.)
            - sourceType: Metrics
              condition: $prefix(proxmox.node.storage.)
            - sourceType: Metrics
              condition: $prefix(proxmox.node.service.)
            - sourceType: Metrics
              condition: $prefix(proxmox.vm.)
            - sourceType: Metrics
              condition: $prefix(proxmox.lxc.)

    - name: proxmox:vm
      displayName: Virtual Machine
      rules:
        - idPattern: proxmox_vm_{cluster}_{node}_{vmid}
          instanceNamePattern: "{vmid}"
          iconPattern: container
          attributes:
            - key: cluster
              displayName: Cluster Name
              pattern: "{cluster}"
            - key: clusterid
              displayName: Cluster ID
              pattern: "{clusterid}"
            - key: node
              displayName: Node Name
              pattern: "{node}"
            - key: nodeip
              displayName: Node IP
              pattern: "{nodeip}"
            - key: vmid
              displayName: VM ID
              pattern: "{vmid}"
            - key: vmname
              displayName: VM Name
              pattern: "{vmname}"
            - key: vmips
              displayName: VM IP
              pattern: "{vmips}"
            - key: dt.security_context
              displayName: Security Context
              pattern: "{dt.security_context}"
          sources:
            - sourceType: Metrics
              condition: $prefix(proxmox.vm.)

    - name: proxmox:container
      displayName: Container
      rules:
        - idPattern: proxmon_container_{cluster}_{node}_{lxcid}
          instanceNamePattern: "{lxcid}"
          iconPattern: container
          attributes:
            - key: cluster
              displayName: Cluster Name
              pattern: "{cluster}"
            - key: clusterid
              displayName: Cluster ID
              pattern: "{clusterid}"
            - key: node
              displayName: Node Name
              pattern: "{node}"
            - key: nodeip
              displayName: Node IP
              pattern: "{nodeip}"
            - key: vmid
              displayName: VM ID
              pattern: "{lxcid}"
            - key: vmname
              displayName: VM Name
              pattern: "{lxcname}"
            - key: dt.security_context
              displayName: Security Context
              pattern: "{dt.security_context}"
          sources:
            - sourceType: Metrics
              condition: $prefix(proxmox.lxc.)

  relationships:
    - typeOfRelation: RUNS_ON
      fromType: proxmox:node
      toType: proxmox:cluster
      sources:
        - sourceType: Metrics
          condition: $prefix(proxmox.node.)
    - typeOfRelation: RUNS_ON
      fromType: proxmox:vm
      toType: proxmox:node
      sources:
        - sourceType: Metrics
          condition: $prefix(proxmox.vm.)
    - typeOfRelation: RUNS_ON
      fromType: proxmox:container
      toType: proxmox:node
      sources:
        - sourceType: Metrics
          condition: $prefix(proxmox.lxc.)
    - typeOfRelation: SAME_AS
      fromType: proxmox:node
      toType: host
      sources:
        - sourceType: Entities
          mappingRules:
            - sourceProperty: nodeip
              sourceTransformation: To lower case
              destinationProperty: dt.ip_addresses
              destinationTransformation: To lower case
    - typeOfRelation: SAME_AS
      fromType: proxmox:vm
      toType: host
      sources:
        - sourceType: Entities
          mappingRules:
            - sourceProperty: vmips
              sourceTransformation: To lower case
              destinationProperty: dt.ip_addresses
              destinationTransformation: To lower case

screens:
  - entityType: proxmox:cluster
    listSettings:
      staticContent:
        showGlobalFilter: false
        header:
          title: Proxmox Clusters
          description: List of Proxmox Clusters
          icon: cluster
        breadcrumbs:
          - type: NOOP
            displayName: Proxmox
          - type: ENTITY_LIST_REF
            displayName: Clusters
            entityType: proxmox:cluster
      layout:
        autoGenerate: false
        cards:
          - key: proxmox_clusters_charts_overview
            type: CHART_GROUP
          - key: proxmox_clusters_list_self
            type: ENTITIES_LIST
          - type: INJECTIONS
    detailsSettings:
      target: BOTH
      staticContent:
        showProblems: true
        showProperties: true
        showTags: true
        showGlobalFilter: false
        showAddTag: true
        breadcrumbs:
          - type: NOOP
            displayName: Proxmox
          - type: ENTITY_LIST_REF
            displayName: Clusters
            entityType: proxmox:cluster
      layout:
        autoGenerate: false
        cards:
          - key: proxmox_clusters_charts_overview
            type: CHART_GROUP
          - key: proxmox_cluster_nodes
            type: ENTITIES_LIST
          - key: proxmox_cluster_nodes_dql
            type: DQL_TABLE
          - key: proxmox_cluster_node_vms
            type: ENTITIES_LIST
          - key: proxmox_cluster_node_containers
            type: ENTITIES_LIST
          - type: INJECTIONS

    chartsCards:
      - key: proxmox_clusters_charts_overview
        target: BOTH
        mode: NORMAL
        numberOfVisibleCharts: 7
        displayName: Cluster Overview
        description: Overview of Proxmox Clusters
        charts:
          - displayName: Nodes
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              metric:
                metricSelector: proxmox.node.online:splitBy("dt.entity.proxmox:cluster"):sum:sort(value(max,descending)):last
                dqlQuery: >
                  timeseries nodes = count(proxmox.node.online, scalar: true), by: { `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:cluster` == $(entityId)}, interval:5m
                    | summarize { nodes = sum(nodes)}, by: { timestamp=now() }
              showSparkline: true
              showTrend: true

          - displayName: Virtual Machines
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              metric:
                metricSelector: proxmox.node.vm:splitBy("dt.entity.proxmox:cluster"):sum:sort(value(max,descending)):last
                dqlQuery: >
                  timeseries { count(proxmox.node.vm), vms = max(proxmox.node.vm, scalar: true) }, by: { `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` },  filter:{`dt.entity.proxmox:cluster` == $(entityId)}, interval:5m
                    | summarize vms = sum(vms), by: { timestamp=now() }
              showTrend: true
              showSparkline: true

          - displayName: Containers
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              metric:
                metricSelector: proxmox.node.lxc:splitBy("dt.entity.proxmox:cluster"):sum:sort(value(max,descending)):last
                dqlQuery: >
                  timeseries { count(proxmox.node.lxc), containers = max(proxmox.node.lxc, scalar: true) }, by: { `dt.entity.proxmox:node`, `dt.entity.proxmox:cluster` },  filter:{`dt.entity.proxmox:cluster` == $(entityId)}, interval:5m
                    | summarize containers = sum(containers), by: { timestamp=now() }
              showTrend: true
              showSparkline: true

          - displayName: HA Quorate Nodes
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              metric:
                metricSelector: proxmox.cluster.ha.quorate:splitBy("dt.entity.proxmox:cluster"):sort(value(auto,descending)):last
                dqlQuery: >
                  timeseries ha_quorate =  min(proxmox.cluster.ha.quorate), by: { `dt.entity.proxmox:cluster` },  filter:{`dt.entity.proxmox:cluster` == $(entityId)}, interval:5m
                    | fieldsAdd ha_quorate = arrayLast(ha_quorate)
                    | fields ha_quorate
                    | summarize ha_quorate = takeLast(ha_quorate), by:{timestamp=now()}
              showTrend: true
              showSparkline: true

          - displayName: HA Status
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              metric:
                metricSelector: proxmox.cluster.ha.status:splitBy("dt.entity.proxmox:cluster"):sort(value(auto,descending)):last
                dqlQuery: >
                  timeseries ha_status = min(proxmox.cluster.ha.status), by: { `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:cluster` == $(entityId)}, interval:5m
                  | fieldsAdd ha_status = arrayLast(ha_status)
                  | fields ha_status
                  | summarize ha_quorate = takeLast(ha_status), by:{timestamp=now()}
              showTrend: true
              showSparkline: true

          - displayName: SDN Status
            visualizationType: SINGLE_VALUE
            singleValueConfig:
              metric:
                metricSelector: proxmox.cluster.ha.status:splitBy("dt.entity.proxmox:cluster"):sort(value(auto,descending)):last
                dqlQuery: >
                  timeseries sdn_status = min(proxmox.cluster.sdn.status), by: { `dt.entity.proxmox:cluster` }, filter:{`dt.entity.proxmox:cluster` == $(entityId)}, interval:5m
                  | fieldsAdd sdn_status = arrayLast(sdn_status)
                  | fields sdn_status
                  | summarize sdn_status = takeLast(sdn_status), by:{timestamp=now()}
              showTrend: true
              showSparkline: true

    entitiesListCards:
      - key: proxmox_clusters_list_self
        displayName: Clusters
        pageSize: 5
        entitiesLimit: 500
        displayCharts: false
        numberOfVisibleCharts: 2
        enableDetailsExpandability: false
        displayIcons: true

        charts:
          - displayName: Nodes Online
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: proxmox.cluster.node.online:last

          - displayName: Nodes Total
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: proxmox.cluster.node:last

          - displayName: Virtual Machines Total
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: proxmox.node.vm

          - displayName: Containers Total
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: proxmox.node.lxc

        columns:
          - type: RELATION
            relation:
              entitySelectorTemplate: type(proxmox:node),fromRelationships.runson($(entityConditions))
              displayName: Nodes
              displayAmount: true
              fallbackMessage: No nodes

      - key: proxmox_cluster_nodes
        displayName: Nodes
        pageSize: 5
        entitiesLimit: 100
        displayCharts: false
        enableDetailsExpandability: false
        numberOfVisibleCharts: 2
        displayIcons: true
        entitySelectorTemplate: type(proxmox:node),fromRelationships.runson($(entityConditions))

        charts:
          - displayName: Memory Used
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: proxmox.node.memory.used:last
          - displayName: CPU Usage
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: proxmox.node.cpu.usage:last
          - displayName: Storage Used
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: ( proxmox.node.storage.used:last / proxmox.node.storage.total:last ) * 100
          - displayName: Load Average (1min)
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: proxmox.node.loadavg."1min":last
          - displayName: Load Average (5min)
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: proxmox.node.loadavg."5min":last
          - displayName: Load Average (15min)
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: proxmox.node.loadavg."15min":last
          - displayName: Uptime
            visualizationType: GRAPH_CHART
            graphChartConfig:
              metrics:
                - metricSelector: proxmox.node.uptime:last

      - key: proxmox_cluster_node_vms
        displayName: Virtual Machines
        pageSize: 5
        entitiesLimit: 100
        displayCharts: false
        enableDetailsExpandability: false
        numberOfVisibleCharts: 2
